<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>!LOGIN!</title>
  <link rel="stylesheet" href="index.css">
  <link rel="icon" href="pluto.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playwrite+NO:wght@100..400&display=swap" rel="stylesheet">
</head>
<body>
  <div class="form">

    <form>

      <h2>Contact Us!</h2>

      <div class=" x fname">
      <label for="fname">First Name:</label>
      <input type="text" name="fname" id="fname" placeholder="Enter your first name.." required>
      </div>


      <div class=" x lname">
      <label for="lname">Last Name:</label>
      <input type="text" name="lname" id="lname" placeholder="Enter your last name.." required>
      </div>


      <div class="x email">
     <label for="email">Email Id:</label>
      <input type="email" name="email" id="email" placeholder="Enter your email id.." required>
        </div>


      <div class="x phno">
      <label for="phno">Contact Number:</label>
      <input type="number" name="phno" id="phno" placeholder="Enter your contact number.." required>
      </div>

        <div class="buttons">
      <button class="submit" type="submit">Submit</button>
      <button class="reset" type="reset">Reset</button>
    </div>

    </form>
  </div>

  <script src="index.js"></script>
</body>
</html>
